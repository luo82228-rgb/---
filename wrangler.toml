name = "yp"
main = "src/index.ts"
compatibility_date = "2024-09-09"
compatibility_flags = ["nodejs_compat"]

# 三种身份的访问密码存这里（key: pw:owner / pw:advanced / pw:viewer），看板设置面板可在线修改
[[kv_namespaces]]
binding = "AUTH_KV"
id = "3eedd204deeb492595bf61787c572539"

[assets]
directory = "./public"
binding = "ASSETS"
# 所有请求先进 Worker 做密码校验，否则静态资源会绕过登录直接命中
run_worker_first = true
